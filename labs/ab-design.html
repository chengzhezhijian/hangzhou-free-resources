<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>整站 UX AB · 美团单行筛选</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Noto Sans SC", sans-serif; background: #0c0c10; color: #eee; padding: 20px 14px 48px; }
    h1 { margin: 0 0 8px; font-size: 1.4rem; }
    .sub { color: #888; font-size: 0.88rem; line-height: 1.55; max-width: 920px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; max-width: 1500px; margin: 20px auto 0; }
    .cell { background: #16161c; border-radius: 14px; overflow: hidden; border: 1px solid #2a2a32; }
    .cell.top { border-color: #ffd60a; }
    .meta { padding: 12px 14px; border-bottom: 1px solid #222; }
    .meta strong { font-size: 0.95rem; }
    .meta small { display: block; color: #888; font-size: 0.72rem; margin-top: 4px; line-height: 1.45; }
    .dim { display: inline-block; margin-top: 6px; padding: 2px 8px; border-radius: 6px; background: #252530; font-size: 0.65rem; font-weight: 600; }
    iframe { width: 100%; height: 620px; border: none; background: #fff; }
    .acts { display: flex; gap: 8px; padding: 10px 12px; }
    .acts a { flex: 1; text-align: center; padding: 9px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; text-decoration: none; background: #252530; color: #fff; }
    .acts a.primary { background: #007aff; }
  </style>
</head>
<body>
  <h1>整站 UX AB · 美团/淘宝单行筛选</h1>
  <p class="sub">统一规范：搜索框下方<strong>仅一行</strong>横滑筛选；排序为「综合排序 ▾」下拉（综合/距离/评分）；点「筛选」从工具栏<strong>向下</strong>展开，非底部 Sheet。</p>
  <div class="grid" id="grid"></div>
  <script>
    const DESIGNS = [
      { id: "d01", name: "标准单行", dim: "基准", desc: "设施 | 场景 | 综合·距离·筛选" },
      { id: "d02", name: "搜索优先", dim: "交互", desc: "场景 | 排序，行列表" },
      { id: "d03", name: "分类 Tab", dim: "结构", desc: "大类 Tab 单行 + 双列卡片" },
      { id: "d04", name: "场景前置", dim: "筛选", desc: "场景 + 设施 + 排序，单行" },
      { id: "d05", name: "设施筛选", dim: "结构", desc: "设施多选 + 排序，单行" },
      { id: "d06", name: "附近优先", dim: "交互", desc: "📍 + 设施 + 距离排序，无横幅" },
      { id: "d07", name: "双列探索", dim: "结构", desc: "分类 + 设施 + 排序，双列" },
      { id: "d08", name: "分区目录", dim: "结构", desc: "大类单行 + 分区列表" },
      { id: "d09", name: "高密度", dim: "交互", desc: "合并 Chip 单行 + 极简列表" },
      { id: "d10", name: "办事引导", dim: "筛选", desc: "①②③ 内联单行 + 场景" },
    ];
    const grid = document.getElementById("grid");
    DESIGNS.forEach((d, i) => {
      const cell = document.createElement("div");
      cell.className = "cell" + (i === 0 ? " top" : "");
      cell.innerHTML = `
        <div class="meta">
          <strong>${d.id} · ${d.name}</strong>
          <span class="dim">${d.dim}</span>
          <small>${d.desc}</small>
        </div>
        <iframe loading="lazy" src="../index.html?design=${d.id}&v=45&lab=1" title="${d.name}"></iframe>
        <div class="acts">
          <a class="primary" href="../index.html?design=${d.id}&v=45" target="_blank">全屏验收</a>
        </div>`;
      grid.appendChild(cell);
    });
  </script>
</body>
</html>
